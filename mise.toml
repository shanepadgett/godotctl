[tools]
go = "1.25.6"
golangci-lint = "latest"
"go:golang.org/x/tools/cmd/deadcode" = "latest"

[env]
_.file = ".env"

[tasks.package-addon]
description = "Package addons/godot_bridge into embedded zip"
run = "go -C cli run ./cmd/packageaddon"

[tasks.build]
description = "Build CLI into root bin"
depends = ["package-addon"]
shell = "bash -lc"
run = '''set -euo pipefail
mkdir -p bin
if [ -f bin/godotctl.exe ]; then
  ./bin/godotctl.exe daemon stop >/dev/null 2>&1 || true
  sleep 0.2
fi
go -C cli build -o ../bin/godotctl.exe ./cmd/godotctl'''

[tasks.validate]
description = "Run full Go validation (fmt, test, vet, lint, deadcode)"
depends = ["package-addon"]
shell = "bash -lc"
run = '''set -euo pipefail
go -C cli fmt ./...
go -C cli test ./...
go -C cli vet ./...
(
  cd cli
  golangci-lint run ./...
  deadcode -test ./...
)'''

[tasks.cli]
description = "Run godotctl via go run (pass args after --)"
depends = ["package-addon"]
run = "go -C cli run ./cmd/godotctl"

[tasks.launch-editor]
description = "Build and launch root project in Godot 4.6"
depends = ["build"]
shell = "bash -lc"
run = '''if [ -z "${GODOT46_EXE:-}" ]; then printf "Set GODOT46_EXE to your Godot 4.6 executable path.\n"; exit 1; fi
exe="$GODOT46_EXE"
if command -v cygpath >/dev/null 2>&1; then
  exe="$(cygpath -u "$exe" 2>/dev/null || printf %s "$exe")"
fi
if [ ! -f "$exe" ]; then
  printf "GODOT46_EXE does not point to a file: %s\n" "$exe"
  exit 1
fi
"$exe" --editor --path .'''

[tasks.launch-editor-detached]
description = "Build and launch root project detached"
depends = ["build"]
shell = "bash -lc"
run = '''if [ -z "${GODOT46_EXE:-}" ]; then printf "Set GODOT46_EXE to your Godot 4.6 executable path.\n"; exit 1; fi
exe="$GODOT46_EXE"
if command -v cygpath >/dev/null 2>&1; then
  exe="$(cygpath -u "$exe" 2>/dev/null || printf %s "$exe")"
fi
if [ ! -f "$exe" ]; then
  printf "GODOT46_EXE does not point to a file: %s\n" "$exe"
  exit 1
fi
"$exe" --editor --path . >/dev/null 2>&1 &
printf "launched Godot in background (pid=%s)\n" "$!"'''

[tasks.release-next-version]
description = "Compute next semantic version from commits"
run = "bash scripts/release/next_version.sh --initial-version 0.0.0"
