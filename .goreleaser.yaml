version: 2

project_name: godotctl

before:
  hooks:
    - go -C cli run ./cmd/packageaddon

builds:
  - id: godotctl
    dir: cli
    main: ./cmd/godotctl
    binary: godotctl
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: godotctl-archives
    ids:
      - godotctl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

release:
  prerelease: auto
